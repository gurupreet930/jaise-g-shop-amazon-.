<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Shop | Checkout System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .amazon-bg { background-color: #131921; }
        .checkout-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; }
        .yellow-btn { background: #ffd814; border: 1px solid #fcd200; border-radius: 8px; }
        .yellow-btn:hover { background: #f7ca00; }
    </style>
</head>
<body class="bg-gray-100">

    <header class="amazon-bg p-3 flex items-center justify-between text-white">
        <h1 class="text-2xl font-bold text-orange-400">G-SHOP</h1>
        <div class="flex gap-4">
            <i class="fas fa-shopping-cart text-xl"></i>
            <span class="font-bold">Cart (0)</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6 mt-10 bg-white shadow-lg rounded-lg flex flex-col md:flex-row gap-8">
        <div class="flex-1">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=600" class="rounded-lg shadow-sm">
        </div>
        <div class="flex-1 space-y-4">
            <h2 class="text-3xl font-bold">Premium Smart Watch (G-Series)</h2>
            <p class="text-gray-500">Best seller in Tech | 2026 Edition</p>
            <div class="text-3xl font-bold text-red-700">₹1,499.00</div>
            <p class="text-sm">FREE delivery <span class="font-bold text-blue-600">Tomorrow</span>. Order within 4 hrs.</p>
            
            <button onclick="openCheckout()" class="yellow-btn w-full py-3 font-bold text-lg shadow-md transition-all active:scale-95">
                Buy Now
            </button>
        </div>
    </main>

    <div id="checkoutModal" class="checkout-modal items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-xl shadow-2xl overflow-hidden animate-bounce-short">
            <div class="bg-gray-100 p-4 border-b flex justify-between items-center">
                <h3 class="text-xl font-bold">Checkout Details</h3>
                <button onclick="closeCheckout()" class="text-gray-500 hover:text-black"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-bold mb-1">Full Name</label>
                    <input type="text" placeholder="Abhishek..." class="w-full border rounded p-2 focus:ring-2 focus:ring-orange-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">Shipping Address</label>
                    <textarea placeholder="House No, Area, City, Pin Code..." class="w-full border rounded p-2 focus:ring-2 focus:ring-orange-400 outline-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">Payment Method</label>
                    <select class="w-full border rounded p-2 bg-gray-50">
                        <option>Cash on Delivery (COD)</option>
                        <option>UPI / PhonePe</option>
                        <option>Credit/Debit Card</option>
                    </select>
                </div>
                
                <div class="border-t pt-4">
                    <div class="flex justify-between text-lg font-bold mb-4">
                        <span>Total Pay:</span>
                        <span class="text-red-700">₹1,499.00</span>
                    </div>
                    <button onclick="alert('Order Placed Successfully!')" class="w-full bg-orange-400 hover:bg-orange-500 text-white font-bold py-3 rounded-lg shadow-lg">
                        Place Order
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openCheckout() {
            document.getElementById('checkoutModal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Stop scrolling
        }

        function closeCheckout() {
            document.getElementById('checkoutModal').style.display = 'none';
            document.body.style.overflow = 'auto'; // Enable scrolling
        }

        // Close when clicking outside the box
        window.onclick = function(event) {
            let modal = document.getElementById('checkoutModal');
            if (event.target == modal) {
                closeCheckout();
            }
        }
    </script>

</body>
</html>
