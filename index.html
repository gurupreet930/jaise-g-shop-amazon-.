<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Shop | Best Deals Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .amazon-gradient { background: linear-gradient(to bottom, #131921, #232f3e); }
        .yellow-btn { background-color: #ffd814; border-color: #fcd200; }
        .yellow-btn:hover { background-color: #f7ca00; }
        .orange-btn { background-color: #ffa41c; border-color: #ff8f00; }
        .nav-belt { background-color: #131921; color: white; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <header class="nav-belt p-2 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-bold text-orange-400 ml-4">G-SHOP</h1>
            <div class="hidden md:flex flex-col text-xs ml-4">
                <span class="text-gray-400">Deliver to</span>
                <span class="font-bold"><i class="fas fa-map-marker-alt"></i> Bhilai, India</span>
            </div>
        </div>

        <div class="flex-grow max-w-2xl mx-4">
            <div class="flex">
                <input type="text" class="w-full p-2 rounded-l-md text-black outline-none" placeholder="Search G-Shop Items...">
                <button class="bg-orange-400 p-2 rounded-r-md px-4 text-black font-bold">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <div class="flex items-center gap-6 mr-4">
            <div class="hidden md:block">
                <p class="text-xs">Hello, Sign in</p>
                <p class="font-bold">Account & Lists</p>
            </div>
            <div class="relative">
                <i class="fas fa-shopping-cart text-2xl"></i>
                <span class="absolute -top-2 -right-2 bg-orange-500 text-black text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">0</span>
            </div>
        </div>
    </header>

    <section class="relative h-64 md:h-96 w-full overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-t from-gray-100 to-transparent z-10"></div>
        <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=1200" class="w-full h-full object-cover" alt="Banner">
        <div class="absolute top-10 left-10 z-20 max-w-md">
            <h2 class="text-3xl md:text-5xl font-extrabold text-white mb-4">Upto 70% Off on Tech</h2>
            <button class="yellow-btn px-6 py-2 rounded-md font-semibold text-black">Shop Now</button>
        </div>
    </section>

    <main class="max-w-7xl mx-auto -mt-20 relative z-20 px-4">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div class="bg-white p-6 shadow-md rounded-sm flex flex-col">
                <h3 class="font-bold text-xl mb-2">Smart Gadgets</h3>
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=400" class="h-48 object-contain mb-4" alt="Watch">
                <p class="text-sm text-green-700 font-bold">New Release</p>
                <p class="text-2xl font-bold mt-2">₹1,499.00</p>
                <button class="orange-btn w-full mt-4 py-2 rounded-lg font-semibold shadow-sm">Add to Cart</button>
            </div>

            <div class="bg-white p-6 shadow-md rounded-sm flex flex-col">
                <h3 class="font-bold text-xl mb-2">Home Decor</h3>
                <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=400" class="h-48 object-contain mb-4" alt="Home">
                <p class="text-sm text-blue-600">Free Delivery</p>
                <p class="text-2xl font-bold mt-2">₹899.00</p>
                <button class="orange-btn w-full mt-4 py-2 rounded-lg font-semibold shadow-sm">Add to Cart</button>
            </div>

            <div class="bg-white p-6 shadow-md rounded-sm flex flex-col">
                <h3 class="font-bold text-xl mb-2">Wireless Audio</h3>
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=400" class="h-48 object-contain mb-4" alt="Audio">
                <p class="text-sm text-red-600 font-bold">Limited Time Deal</p>
                <p class="text-2xl font-bold mt-2">₹2,999.00</p>
                <button class="orange-btn w-full mt-4 py-2 rounded-lg font-semibold shadow-sm">Add to Cart</button>
            </div>

            <div class="bg-white p-6 shadow-md rounded-sm flex flex-col">
                <h3 class="font-bold text-xl mb-2">Office Needs</h3>
                <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?auto=format&fit=crop&w=400" class="h-48 object-contain mb-4" alt="Office">
                <p class="text-sm text-gray-500">Best Seller</p>
                <p class="text-2xl font-bold mt-2">₹45,999.00</p>
                <button class="orange-btn w-full mt-4 py-2 rounded-lg font-semibold shadow-sm">Add to Cart</button>
            </div>
