<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-SHOP | Premium Amazon Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ffffff; color: #000000; font-family: 'Arial', sans-serif; }
        .amz-header { background-color: #131921; }
        .amazon-orange { background-color: #ff9900; }
        .amazon-yellow { background-color: #ffd814; }
        .gold-text { color: #d4af37; }
        #admin-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; }
    </style>
</head>
<body>

<header class="amz-header p-4 text-white flex items-center justify-between shadow-md">
    <h1 class="text-3xl font-bold gold-text tracking-widest cursor-pointer" onclick="location.reload()">G-SHOP</h1>
    
    <div class="flex-1 mx-8 hidden md:block">
        <div class="flex bg-white rounded overflow-hidden">
            <input type="text" class="w-full p-2 text-black outline-none" placeholder="Search premium electronics...">
            <button class="bg-[#febd69] px-6 text-black">🔍</button>
        </div>
    </div>

    <div class="flex gap-6 text-xs items-center">
        <div class="bg-gray-800 px-3 py-1 rounded-full border border-gray-600 text-[10px]">🇺🇸 USA / CANADA</div>
        <div class="cursor-pointer text-center" onclick="openAdmin()">Hello, Gurpreet<br><span class="font-bold text-sm">Account & Admin</span></div>
        <div class="font-bold text-lg cursor-pointer">🛒 <span id="cart-count">0</span></div>
    </div>
</header>

<div class="bg-yellow-100 border-b border-yellow-300 p-2 text-center text-sm font-bold text-orange-800">
    🎁 LOYALTY REWARD: Spend $100+ get $30 OFF Instantly! | Spend $200+ get $50 OFF!
</div>

<main class="p-6 max-w-7xl mx-auto">
    <h2 class="text-2xl font-bold mb-8 border-b pb-2">Featured Premium Deals</h2>
    
    <div id="product-list" class="grid grid-cols-1 md:grid-cols-3 gap-8">
        </div>
</main>

<div id="checkout-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-gray-200 p-6 shadow-2xl hidden transform translate-y-full transition-transform duration-500 z-40">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
        <div>
            <h3 class="text-xl font-bold" id="item-name-display">Elite Wireless Pods Pro</h3>
            <p id="savings-alert" class="text-green-600 font-bold text-sm"></p>
        </div>
        <div class="text-right">
            <p class="text-gray-500 line-through text-sm" id="old-price"></p>
            <p class="text-3xl font-bold text-red-600">Total: $<span id="final-price-display">0</span></p>
            <button onclick="confirmOrder()" class="amazon-yellow mt-2 px-12 py-3 rounded-full font-bold text-black shadow-lg hover:bg-[#f7ca00]">
                PLACE ORDER
            </button>
        </div>
    </div>
</div>

<div id="admin-modal" class="flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl w-full max-w-md text-black shadow-2xl">
        <h2 class="text-2xl font-bold mb-2">Admin Control Panel</h2>
        <p class="text-gray-500 text-sm mb-6">Enter secure credentials to view profit analytics.</p>
        <input type="password" id="admin-password-input" class="w-full border-2 p-3 rounded-lg mb-4 outline-none focus:border-orange-500" placeholder="Enter Admin Password">
        <button onclick="verifyAdmin()" class="w-full bg-black text-white p-4 rounded-lg font-bold hover:bg-gray-800">LOGIN</button>
        <button onclick="closeAdmin()" class="w-full mt-3 text-gray-400 text-sm">Close</button>
    </div>
</div>

<script>
    const ADMIN_PASS = "Guru930";
    const products = [
        { id: 1, name: "Elite Wireless Pods Pro", price: 129.99, img: "https://m.media-amazon.com/images/I/61jSbe9PZpL._AC_SL1500_.jpg" },
        { id: 2, name: "UltraSlim 4K Dash Cam", price: 185.00, img: "https://m.media-amazon.com/images/I/71YvU0DuxvL._AC_SL1500_.jpg" },
        { id: 3, name: "SmartWatch Pro X7", price: 249.99, img: "https://m.media-amazon.com/images/I/61ZjlBOp+rL._AC_SL1500_.jpg" }
    ];

    function initProducts() {
        const list = document.getElementById('product-list');
        products.forEach(p => {
            list.innerHTML += `
                <div class="bg-white rounded-xl overflow-hidden border border-gray-200 p-5 hover:shadow-xl transition duration-300">
                    <img src="${p.img}" class="h-56 w-full object-contain mb-4">
                    <h3 class="text-lg font-bold text-gray-800">${p.name}</h3>
                    <p class="text-xs text-gray-400 mb-2">High-Fidelity | USA Warehouse Stock</p>
                    <p class="text-orange-500 text-sm">★★★★★ <span class="text-blue-500">4.9/5</span></p>
                    
                    <div class="flex justify-between items-end mt-4">
                        <div>
                            <span class="text-2xl font-black text-gray-900">$${p.price}</span>
                        </div>
                        <button onclick="handleBuy(${p.id})" class="amazon-yellow text-black px-6 py-2 rounded-full font-bold shadow-md hover:bg-[#f7ca00]">
                            BUY NOW
                        </button>
                    </div>
                    <p class="text-[10px] text-green-600 mt-3 font-bold">🔥 85% of users in your area are buying this!</p>
                </div>`;
        });
    }

    function handleBuy(id) {
        const p = products.find(x => x.id === id);
        let final = p.price;
        let savings = 0;

        // Loyalty Logic: Instant Discount
        if (p.price > 200) {
            savings = 50;
            final = p.price - 50;
            document.getElementById('savings-alert').innerText = "🎉 Instant $50 Loyalty Discount Applied!";
        } else if (p.price > 100) {
            savings = 30;
            final = p.price - 30;
            document.getElementById('savings-alert').innerText = "🎉 Instant $30 Loyalty Discount Applied!";
        }

        document.getElementById('item-name-display').innerText = p.name;
        document.getElementById('old-price').innerText = "$" + p.price;
        document.getElementById('final-price-display').innerText = final.toFixed(2);
        document.getElementById('cart-count').innerText = "1";
        
        const bar = document.getElementById('checkout-bar');
        bar.classList.remove('hidden');
        setTimeout(() => bar.classList.remove('translate-y-full'), 10);
    }

    function confirmOrder() {
        alert("CONNECTING TO US WAREHOUSE...\n\nPayment Split: Profit secured to Gurpreet's Wallet.\nSupplier Order: Automatic fulfillment initiated.\nStatus: Success!");
        location.reload();
    }

    // Admin Functions
    function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
    
    function verifyAdmin() {
        const pass = document.getElementById('admin-password-input').value;
        if(pass === ADMIN_PASS) {
            alert("WELCOME GURPREET!\n\nAdmin Dashboard:\n- Active Orders: 12\n- Profit Secured Today: $420.00\n- Automation: 100% Operational");
            closeAdmin();
        } else {
            alert("Error: Unauthorized Access.");
        }
    }

    initProducts();
</script>
</body>
</html>
