<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Shop | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ffffff; color: #000000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .amz-header { background-color: #131921; }
        .btn-amazon { background-color: #ff9900; border-radius: 8px; transition: 0.3s; }
        .btn-amazon:hover { background-color: #e68a00; }
        .admin-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; }
    </style>
</head>
<body>

<header class="amz-header p-4 text-white flex items-center justify-between">
    <h1 class="text-2xl font-bold text-[#ff9900] cursor-pointer" onclick="location.reload()">G-Shop</h1>
    <div class="flex-1 mx-10 hidden md:block">
        <div class="flex bg-white rounded-md overflow-hidden">
            <input type="text" class="w-full p-2 text-black outline-none" placeholder="Search for premium electronics...">
            <button class="bg-[#febd69] px-4 text-black">🔍</button>
        </div>
    </div>
    <div class="flex gap-6 text-sm items-center">
        <div class="cursor-pointer" onclick="showAdminLogin()">Hello, Gurpreet<br><span class="font-bold text-sm">Admin Panel</span></div>
        <div class="font-bold cursor-pointer">🛒 Cart (<span id="cart-count">0</span>)</div>
    </div>
</header>

<div class="bg-blue-600 text-white p-2 text-center text-sm font-bold">
    🔥 LOYALTY REWARD: Spend $100+ get $30 INSTANT OFF | Spend $200+ get $50 INSTANT OFF!
</div>

<main class="p-6 max-w-7xl mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="product-grid">
        </div>
</main>

<div id="checkout-section" class="fixed bottom-0 left-0 right-0 bg-white border-t p-6 shadow-2xl hidden translate-y-full transition-transform duration-500">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
        <div>
            <h3 class="text-lg font-bold">Order Summary</h3>
            <p id="savings-text" class="text-green-600 font-bold"></p>
        </div>
        <div class="text-right">
            <p class="text-xl font-bold text-red-600">Total: $<span id="final-total">0</span></p>
            <button onclick="processOrder()" class="btn-amazon px-10 py-3 mt-2 font-bold text-black">CONFIRM & PAY</button>
        </div>
    </div>
</div>

<div id="admin-modal" class="admin-modal flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl w-full max-w-md text-black">
        <h2 class="text-2xl font-bold mb-4">Admin Security</h2>
        <input type="password" id="admin-pass" class="w-full border p-3 rounded mb-4" placeholder="Enter Password">
        <button onclick="checkAdmin()" class="w-full bg-black text-white p-3 rounded font-bold">LOGIN</button>
        <button onclick="closeAdmin()" class="w-full mt-2 text-gray-500">Cancel</button>
    </div>
</div>

<script>
    let cartTotal = 0;
    const passwordSet = "Guru930";
    const products = [
        { id: 1, name: "Elite Wireless Pods Pro", price: 129.99, img: "https://m.media-amazon.com/images/I/61jSbe9PZpL._AC_SL1500_.jpg", rating: "4.8" },
        { id: 2, name: "SmartWatch Pro X7", price: 189.50, img: "https://m.media-amazon.com/images/I/61ZjlBOp+rL._AC_SL1500_.jpg", rating: "4.7" },
        { id: 3, name: "4K Stealth Dash Camera", price: 245.00, img: "https://m.media-amazon.com/images/I/71YvU0DuxvL._AC_SL1500_.jpg", rating: "4.9" }
    ];

    function displayProducts() {
        const grid = document.getElementById('product-grid');
        products.forEach(p => {
            grid.innerHTML += `
                <div class="border rounded-lg p-4 shadow-sm hover:shadow-md transition">
                    <img src="${p.img}" class="h-48 mx-auto object-contain mb-4">
                    <h3 class="font-bold text-lg">${p.name}</h3>
                    <p class="text-orange-500 text-sm">⭐ ${p.rating} (Premium Choice)</p>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="text-2xl font-bold">$${p.price}</span>
                        <button onclick="addToCart(${p.price})" class="btn-amazon px-4 py-2 text-sm font-bold shadow-md">BUY NOW</button>
                    </div>
                </div>`;
        });
    }

    function addToCart(price) {
        cartTotal += price;
        updateCheckout();
        document.getElementById('checkout-section').classList.remove('hidden', 'translate-y-full');
        document.getElementById('cart-count').innerText = "1"; // Simplified for demo
    }

    function updateCheckout() {
        let savings = 0;
        let finalPrice = cartTotal;

        if (cartTotal > 200) {
            savings = 50;
            finalPrice = cartTotal - 50;
            document.getElementById('savings-text').innerText = "✅ Instant Savings: -$50 Applied!";
        } else if (cartTotal > 100) {
            savings = 30;
            finalPrice = cartTotal - 30;
            document.getElementById('savings-text').innerText = "✅ Instant Savings: -$30 Applied!";
        }

        document.getElementById('final-total').innerText = finalPrice.toFixed(2);
    }

    function processOrder() {
        alert("AUTOMATION ACTIVE:\n1. Payment Split Initiated\n2. Supplier Order Sent to US Warehouse\n3. Profit Margin Secured in Wallet\n\nSuccess: Order placed!");
        location.reload();
    }

    // Admin Security Logic
    function showAdminLogin() { document.getElementById('admin-modal').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
    
    function checkAdmin() {
        const input = document.getElementById('admin-pass').value;
        if(input === passwordSet) {
            alert("WELCOME ADMIN GURPREET\nTotal Sales: $1,240.00\nProfit: $450.00\nAll systems automatic.");
            closeAdmin();
        } else {
            alert("Access Denied! Incorrect Password.");
        }
    }

    displayProducts();
</script>

</body>
</html>
